<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figure 11: Your Code and the Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="text/babel">
      const Icon = ({ paths, size = 24, className = "", strokeWidth = 2 }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {paths.map((d, i) => (
            <path key={i} d={d} />
          ))}
        </svg>
      );
      const ArrowDown = (p) => <Icon {...p} paths={["M12 5v14", "M19 12l-7 7-7-7"]} />;

      const App = () => (
        <div className="max-w-4xl mx-auto p-8">
          <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
            Figure 11: Your Code and the Platform
          </h2>
          <p className="text-sm text-gray-600 mb-6">
            The platform ships as compiled Docker images. Your work lives in three folders of your own
            repository and is mounted into the running platform, auto-discovered at boot. You never fork the
            platform; the platform never touches your folders.
          </p>

          {/* Your repo */}
          <div className="border-4 border-green-500 rounded-lg p-4 bg-green-50 mb-3">
            <div className="bg-green-600 text-white p-3 rounded-lg mb-3 text-center">
              <h3 className="font-bold text-lg">Your repository <span className="font-normal text-green-200">· authored in Studio</span></h3>
              <p className="text-xs mt-1">Created from the unoverse starter template · yours to own and version · Studio is the dev workbench for everything in this box</p>
            </div>
            <div className="grid grid-cols-3 gap-3 text-xs">
              {[
                ["nodes/", "Logic", "Custom workflow node packages: integrations, services, your business logic"],
                ["rx/", "Design", "Components, templates, styles: the Relationship Experience your Agents render"],
                ["prompts/", "Behavior", "Agent skills and prompt blocks that shape how Agents act"],
              ].map(([dir, kind, desc]) => (
                <div key={dir} className="bg-white rounded-lg p-3 border-2 border-green-400">
                  <p className="font-bold text-green-800 font-mono">{dir}</p>
                  <p className="text-gray-700 font-semibold mt-0.5">{kind}</p>
                  <p className="text-gray-500 mt-1">{desc}</p>
                </div>
              ))}
            </div>
          </div>

          <div className="flex justify-center items-center gap-2 mb-3 text-gray-500">
            <ArrowDown size={22} />
            <span className="text-xs font-mono">mounted + auto-discovered at boot</span>
          </div>

          {/* Platform images */}
          <div className="border-4 border-blue-500 rounded-lg p-4 bg-blue-50 mb-3">
            <div className="bg-blue-600 text-white p-3 rounded-lg mb-3 text-center">
              <h3 className="font-bold text-lg">Platform images</h3>
              <p className="text-xs mt-1">Compiled Docker images, pulled from the registry · never edited by you</p>
            </div>
            <div className="grid grid-cols-5 gap-2 text-xs text-center">
              {["unoverse", "canvas", "studio", "umap", "memory"].map((svc) => (
                <div key={svc} className="bg-white rounded-lg p-2 border-2 border-blue-400 font-bold text-blue-800">
                  {svc}
                </div>
              ))}
            </div>
          </div>

          {/* Update model */}
          <div className="bg-gray-50 rounded-lg p-4 border-2 border-dashed border-gray-400">
            <p className="text-sm text-gray-700">
              <strong>Updates:</strong> platform updates are an image pull
              (<span className="font-mono text-xs">unoverse update</span>). Your three folders ride along
              untouched, and your packages are rediscovered on the next start.
            </p>
          </div>

          <p className="text-xs text-gray-400 text-right mt-4">unoverse platform architecture specification v1.2</p>
        </div>
      );
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
