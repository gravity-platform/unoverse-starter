<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figure 9: Disaster Recovery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>
  <script type="text/babel">
    const Icon = ({ paths, size = 24, className = "", strokeWidth = 2 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round"
        strokeLinejoin="round" className={className}>
        {paths.map((d, i) => <path key={i} d={d} />)}
      </svg>
    );
    const ArrowDown = (p) => <Icon {...p} paths={["M12 5v14","M19 12l-7 7-7-7"]} />;
    const ArrowRight = (p) => <Icon {...p} paths={["M5 12h14","M12 5l7 7-7 7"]} />;

    const App = () => (
      <div className="max-w-6xl mx-auto p-8">
        <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
          Figure 9: Disaster Recovery
        </h2>

        {/* RPO/RTO Targets */}
        <div className="grid grid-cols-2 gap-6 mb-8">
          <div className="border-2 border-blue-400 rounded-lg overflow-hidden">
            <div className="bg-blue-600 text-white p-4">
              <h3 className="font-bold text-lg">Standard Tier</h3>
            </div>
            <div className="p-5 bg-blue-50">
              <div className="grid grid-cols-2 gap-4">
                <div className="bg-white rounded-lg p-4 text-center shadow">
                  <p className="text-xs text-gray-500 uppercase tracking-wide">RPO</p>
                  <p className="text-3xl font-bold text-blue-700 mt-1">1 hr</p>
                  <p className="text-xs text-gray-500 mt-1">Recovery Point Objective</p>
                </div>
                <div className="bg-white rounded-lg p-4 text-center shadow">
                  <p className="text-xs text-gray-500 uppercase tracking-wide">RTO</p>
                  <p className="text-3xl font-bold text-blue-700 mt-1">4 hr</p>
                  <p className="text-xs text-gray-500 mt-1">Recovery Time Objective</p>
                </div>
              </div>
              <div className="mt-3 bg-blue-100 rounded p-2">
                <p className="text-xs text-blue-900"><strong>Strategy:</strong> Daily backups, manual restore</p>
              </div>
            </div>
          </div>

          <div className="border-2 border-purple-400 rounded-lg overflow-hidden">
            <div className="bg-purple-600 text-white p-4">
              <h3 className="font-bold text-lg">High Availability Tier</h3>
            </div>
            <div className="p-5 bg-purple-50">
              <div className="grid grid-cols-2 gap-4">
                <div className="bg-white rounded-lg p-4 text-center shadow">
                  <p className="text-xs text-gray-500 uppercase tracking-wide">RPO</p>
                  <p className="text-3xl font-bold text-purple-700 mt-1">15 min</p>
                  <p className="text-xs text-gray-500 mt-1">Recovery Point Objective</p>
                </div>
                <div className="bg-white rounded-lg p-4 text-center shadow">
                  <p className="text-xs text-gray-500 uppercase tracking-wide">RTO</p>
                  <p className="text-3xl font-bold text-purple-700 mt-1">1 hr</p>
                  <p className="text-xs text-gray-500 mt-1">Recovery Time Objective</p>
                </div>
              </div>
              <div className="mt-3 bg-purple-100 rounded p-2">
                <p className="text-xs text-purple-900"><strong>Strategy:</strong> Streaming replication, automated failover</p>
              </div>
            </div>
          </div>
        </div>

        {/* Backup Scope */}
        <div className="bg-gray-50 border-2 border-gray-300 rounded-lg p-6 mb-8">
          <h3 className="font-bold text-gray-800 mb-4 text-lg">Backup Scope</h3>
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-200">
                <th className="p-2 text-left font-semibold">Component</th>
                <th className="p-2 text-left font-semibold">Backup Method</th>
                <th className="p-2 text-center font-semibold">Frequency</th>
                <th className="p-2 text-center font-semibold">Retention</th>
                <th className="p-2 text-center font-semibold">Owner</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["PostgreSQL", "pg_dump / streaming", "Hourly", "30 days", "Customer"],
                ["Redis", "RDB snapshots", "Hourly", "7 days", "Customer"],
                ["UMAP models", "File backup", "Daily", "90 days", "unoverse"],
                ["Configuration", "Git + Ansible vars", "On change", "Indefinite", "Both"],
              ].map(([component, method, freq, retention, owner], i) => (
                <tr key={i} className={i % 2 === 0 ? "bg-white" : "bg-gray-50"}>
                  <td className="p-2 font-semibold text-gray-800">{component}</td>
                  <td className="p-2 text-gray-700">{method}</td>
                  <td className="p-2 text-center text-gray-700">{freq}</td>
                  <td className="p-2 text-center text-gray-700">{retention}</td>
                  <td className="p-2 text-center">
                    <span className={`px-2 py-0.5 rounded text-xs font-semibold ${
                      owner === "Customer" ? "bg-orange-100 text-orange-800" :
                      owner === "unoverse" ? "bg-blue-100 text-blue-800" :
                      "bg-gray-200 text-gray-700"
                    }`}>{owner}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Restore Procedure Flow */}
        <div className="bg-red-50 border-2 border-red-300 rounded-lg p-6">
          <h3 className="font-bold text-red-800 mb-5 text-lg">Restore Procedure</h3>
          <div className="space-y-3">
            {[
              { step: 1, label: "Provision new VMs", desc: "Customer provisions replacement VMs per spec", owner: "Customer", color: "bg-orange-500" },
              { step: 2, label: "Run Ansible install", desc: "ansible-playbook -i inventory/dr.yml playbooks/install.yml", owner: "unoverse", color: "bg-blue-600" },
              { step: 3, label: "Restore database", desc: "pg_restore -d gravity /backups/gravity_latest.dump", owner: "Customer", color: "bg-orange-500" },
              { step: 4, label: "Restore UMAP models", desc: "ansible-playbook playbooks/restore.yml -e restore_umap=true -e backup_path=...", owner: "unoverse", color: "bg-blue-600" },
              { step: 5, label: "Verify health", desc: "ansible-playbook -i inventory/dr.yml playbooks/health-check.yml", owner: "Both", color: "bg-green-600" },
            ].map(({ step, label, desc, owner, color }, i) => (
              <div key={step}>
                <div className="flex items-start gap-4">
                  <div className="w-8 h-8 bg-red-700 text-white rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0">{step}</div>
                  <div className="flex-1">
                    <div className="flex items-center gap-3">
                      <p className="font-bold text-gray-800">{label}</p>
                      <span className={`px-2 py-0.5 rounded text-xs font-semibold ${
                        owner === "Customer" ? "bg-orange-100 text-orange-800" :
                        owner === "unoverse" ? "bg-blue-100 text-blue-800" :
                        "bg-green-100 text-green-800"
                      }`}>{owner}</span>
                    </div>
                    <p className="text-xs text-gray-600 mt-1 font-mono">{desc}</p>
                  </div>
                </div>
                {i < 4 && <div className="flex justify-start ml-3 my-1"><ArrowDown size={20} className="text-red-300" /></div>}
              </div>
            ))}
          </div>
        </div>

        <p className="text-xs text-gray-400 text-right mt-6">unoverse platform architecture specification v1.2</p>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
