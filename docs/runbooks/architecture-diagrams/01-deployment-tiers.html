<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figure 1: Deployment Tiers Comparison</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>
  <script type="text/babel">
    const App = () => (
      <div className="max-w-6xl mx-auto p-8">
        <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
          Figure 1: Deployment Tiers Comparison
        </h2>

        <div className="grid grid-cols-3 gap-6 mb-8">
          {/* POC */}
          <div className="border-2 border-yellow-400 rounded-lg p-5 bg-yellow-50">
            <h3 className="font-bold text-yellow-800 mb-3 text-lg text-center">A. POC / Development</h3>
            <div className="bg-white p-4 rounded shadow mb-4">
              <p className="font-bold text-center text-3xl text-yellow-700">1 VM</p>
              <p className="text-xs text-gray-600 text-center mt-1">8 GB RAM</p>
            </div>
            <div className="space-y-2 text-sm">
              <div className="bg-yellow-100 p-3 rounded">
                <p className="font-semibold mb-1">Services:</p>
                <p className="text-xs text-gray-700">All platform services + bundled observability stack on single VM via docker-compose</p>
              </div>
              <div className="bg-yellow-100 p-3 rounded">
                <p className="font-semibold mb-1">Use Cases:</p>
                <p className="text-xs text-gray-700">Internal demos, development, customer POCs</p>
              </div>
              <div className="bg-yellow-200 p-2 rounded text-center">
                <p className="font-bold text-yellow-900">NOT for production</p>
              </div>
            </div>
          </div>

          {/* Standard Enterprise */}
          <div className="border-4 border-green-500 rounded-lg p-5 bg-green-50 relative">
            <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-green-600 text-white px-4 py-1 rounded-full text-xs font-bold shadow">RECOMMENDED</div>
            <h3 className="font-bold text-green-800 mb-3 text-lg text-center mt-2">B. Standard Enterprise</h3>
            <div className="bg-white p-4 rounded shadow mb-4">
              <p className="font-bold text-center text-3xl text-green-700">3 VMs</p>
              <p className="text-xs text-gray-600 text-center mt-1">2 App (8c/32GB) + 1 ML (4c/16GB)</p>
              <p className="text-xs text-gray-500 text-center">Total: 80 GB RAM</p>
            </div>
            <div className="space-y-2 text-sm">
              <div className="bg-green-100 p-3 rounded">
                <p className="font-semibold mb-1">Capacity:</p>
                <p className="text-xs text-gray-700">20,000+ connected users</p>
                <p className="text-xs text-gray-700">1,000-4,000 concurrent executions</p>
                <p className="text-xs text-gray-700">120k-240k workflows/hour</p>
              </div>
              <div className="bg-green-100 p-3 rounded">
                <p className="font-semibold mb-1">HA Model:</p>
                <p className="text-xs text-gray-700">Active/Active App VMs + Dedicated ML VM</p>
              </div>
            </div>
          </div>

          {/* High Availability */}
          <div className="border-2 border-purple-400 rounded-lg p-5 bg-purple-50">
            <h3 className="font-bold text-purple-800 mb-3 text-lg text-center">C. High Availability</h3>
            <div className="bg-white p-4 rounded shadow mb-4">
              <p className="font-bold text-center text-3xl text-purple-700">4+ VMs</p>
              <p className="text-xs text-gray-600 text-center mt-1">3+ App (16c/64GB) + 1 ML (8c/32GB)</p>
              <p className="text-xs text-gray-500 text-center">Total: 224+ GB RAM</p>
            </div>
            <div className="space-y-2 text-sm">
              <div className="bg-purple-100 p-3 rounded">
                <p className="font-semibold mb-1">Capacity:</p>
                <p className="text-xs text-gray-700">50,000+ connected users</p>
                <p className="text-xs text-gray-700">4,000-10,000 concurrent executions</p>
                <p className="text-xs text-gray-700">500k-1M workflows/hour</p>
              </div>
              <div className="bg-purple-100 p-3 rounded">
                <p className="font-semibold mb-1">N+1 Redundancy:</p>
                <p className="text-xs text-gray-700">All tiers have failover capacity</p>
              </div>
            </div>
          </div>
        </div>

        {/* Comparison Table */}
        <div className="bg-gray-50 rounded-lg p-5 border border-gray-200">
          <h4 className="font-semibold text-gray-800 mb-4">Comparison Summary</h4>
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-200">
                <th className="p-2 text-left font-semibold">Aspect</th>
                <th className="p-2 text-center font-semibold">POC</th>
                <th className="p-2 text-center font-semibold bg-green-100">Standard Enterprise</th>
                <th className="p-2 text-center font-semibold">High Availability</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["VMs", "1", "2-3", "4+"],
                ["Total RAM", "8 GB", "80 GB", "224+ GB"],
                ["Connected Users", "Hundreds", "20,000+", "50,000+"],
                ["Concurrent Executions", "Dozens", "1,000-4,000", "4,000-10,000"],
                ["Workflows/hour", "Thousands", "120k-240k", "500k-1M"],
                ["Database", "Customer-managed", "Customer-managed (HA)", "Customer-managed (HA)"],
                ["Redis", "Customer-managed", "Customer-managed (HA)", "Customer-managed (HA)"],
                ["Observability", "Bundled stack", "Export only", "Export only"],
                ["Operations", "docker-compose", "Ansible", "Ansible"],
                ["HA", "None", "Active/Active + dedicated ML", "N+1 all tiers"],
                ["DR", "None", "Documented procedures", "Automated failover"],
              ].map(([label, poc, std, ha], i) => (
                <tr key={i} className={i % 2 === 0 ? "bg-white" : "bg-gray-50"}>
                  <td className="p-2 font-semibold text-gray-800">{label}</td>
                  <td className="p-2 text-center text-xs text-gray-600">{poc}</td>
                  <td className="p-2 text-center text-xs bg-green-50 font-semibold text-gray-800">{std}</td>
                  <td className="p-2 text-center text-xs text-gray-600">{ha}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <p className="text-xs text-gray-400 text-right mt-4">Gravity Platform Architecture Specification v1.2 | CONFIDENTIAL</p>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
