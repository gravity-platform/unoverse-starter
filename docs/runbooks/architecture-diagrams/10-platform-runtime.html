<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figure 10: The unoverse Runtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="text/babel">
      const Icon = ({ paths, size = 24, className = "", strokeWidth = 2 }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {paths.map((d, i) => (
            <path key={i} d={d} />
          ))}
        </svg>
      );
      const ArrowDown = (p) => <Icon {...p} paths={["M12 5v14", "M19 12l-7 7-7-7"]} />;
      const Lock = (p) => (
        <Icon {...p} paths={["M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z", "M7 11V7a5 5 0 0 1 10 0v4"]} />
      );

      const App = () => (
        <div className="max-w-5xl mx-auto p-8">
          <h2 className="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-gray-300 pb-3">
            Figure 10: The unoverse Runtime
          </h2>
          <p className="text-sm text-gray-600 mb-6">
            Every client reaches the platform through the <strong>unoverse</strong> engine's single public,
            JWT-gated listener. The other services specialize. All state lives in Postgres and Redis; the
            services themselves are stateless.
          </p>

          {/* Clients */}
          <div className="mb-3">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Clients</p>
            <div className="grid grid-cols-4 gap-3">
              {[
                ["Web", "Your website + web apps"],
                ["Mobile", "iOS · Android · React Native · Flutter SDKs"],
                ["ChatGPT", "Agents + interfaces as MCP apps"],
                ["MCP clients", "Claude and any MCP-aware host"],
              ].map(([name, desc]) => (
                <div key={name} className="bg-sky-50 rounded-lg p-3 border-2 border-sky-400 text-center">
                  <p className="font-bold text-sky-800 text-sm">{name}</p>
                  <p className="text-xs text-gray-500 mt-1">{desc}</p>
                </div>
              ))}
            </div>
          </div>

          <div className="flex justify-center items-center gap-2 mb-3 text-gray-500">
            <ArrowDown size={22} />
            <span className="text-xs font-mono flex items-center gap-1">
              <Lock size={13} /> HTTPS / WSS · JWT · MCP
            </span>
          </div>

          {/* Engine */}
          <div className="border-4 border-emerald-500 rounded-lg p-4 bg-emerald-50 mb-3">
            <div className="bg-emerald-600 text-white p-3 rounded-lg mb-3 text-center">
              <h3 className="font-bold text-lg">unoverse <span className="font-mono font-normal text-emerald-200 text-sm">:4105 public</span></h3>
              <p className="text-xs mt-1">The engine. One public listener; internal surfaces (:4101, :4106) never leave the Docker network.</p>
            </div>
            <div className="grid grid-cols-3 gap-3 text-xs">
              {[
                ["Workflow engine", "Runs Agents: triggers, nodes, routing, your custom packages"],
                ["Native MCP server", "Serves Agents, tools, and interfaces to any MCP client, streaming live results as nodes execute"],
                ["Additional streaming", "A WebSocket / SSE lane for voice and cross-app state"],
              ].map(([name, desc]) => (
                <div key={name} className="bg-white rounded-lg p-3 border-2 border-emerald-400">
                  <p className="font-bold text-emerald-800">{name}</p>
                  <p className="text-gray-500 mt-1">{desc}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Supporting services */}
          <div className="mb-3">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Platform services</p>
            <div className="grid grid-cols-4 gap-3">
              {[
                ["canvas", ":3001", "Build, manage, and observe Agents"],
                ["studio", ":3002", "Design workbench (dev only, not in production)"],
                ["umap", ":5001", "Spatial ML: the 3D semantic map"],
                ["memory", ":4104", "Relationship memory: profiles + tasks"],
              ].map(([name, port, desc]) => (
                <div key={name} className="bg-white rounded-lg p-3 border-2 border-green-500 shadow-sm text-center">
                  <p className="font-bold text-green-800 text-sm">
                    {name} <span className="font-mono font-normal text-gray-400">{port}</span>
                  </p>
                  <p className="text-xs text-gray-500 mt-1">{desc}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Data */}
          <div>
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">State (customer-managed)</p>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-gray-50 rounded-lg p-3 border-2 border-dashed border-gray-400 text-center">
                <p className="font-bold text-gray-700 text-sm">PostgreSQL <span className="font-mono font-normal text-gray-400">:5432</span></p>
                <p className="text-xs text-gray-500 mt-1">Workflows, content, Spatial coordinates (pgvector), memory</p>
              </div>
              <div className="bg-gray-50 rounded-lg p-3 border-2 border-dashed border-gray-400 text-center">
                <p className="font-bold text-gray-700 text-sm">Redis <span className="font-mono font-normal text-gray-400">:6379</span></p>
                <p className="text-xs text-gray-500 mt-1">Pub/sub event bus, sessions, short-term memory</p>
              </div>
            </div>
          </div>

          <p className="text-xs text-gray-400 text-right mt-4">unoverse platform architecture specification v1.2</p>
        </div>
      );
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
