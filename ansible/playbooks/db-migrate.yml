---
# Gravity Platform Database Migration Playbook
# Sets up database schema - uses CREATE TABLE IF NOT EXISTS (safe to run multiple times)

- name: Database Setup
  hosts: app_vms[0] # Run from first app VM only
  become: yes
  vars_files:
    - ../vars/secrets.yml

  tasks:
    - name: Display migration info
      debug:
        msg: "Running database setup against {{ postgres_host }}"

    - name: Check if database exists
      shell: |
        PGPASSWORD="{{ vault_postgres_password }}" psql \
          -h {{ postgres_host }} \
          -U {{ vault_postgres_user }} \
          -d postgres \
          -tAc "SELECT 1 FROM pg_database WHERE datname='{{ postgres_db }}'"
      register: db_exists
      changed_when: false

    - name: Create database if not exists
      shell: |
        PGPASSWORD="{{ vault_postgres_password }}" psql \
          -h {{ postgres_host }} \
          -U {{ vault_postgres_user }} \
          -d postgres \
          -c "CREATE DATABASE {{ postgres_db }}"
      when: db_exists.stdout != "1"

    - name: Run table initialization (CREATE TABLE IF NOT EXISTS)
      command: >
        docker compose exec -T workflow 
        node -e "
          const { initializeTables } = require('./dist/db');
          initializeTables().then(() => {
            console.log('Tables initialized successfully');
            process.exit(0);
          }).catch(err => {
            console.error('Failed:', err);
            process.exit(1);
          });
        "
      args:
        chdir: /opt/gravity
      register: init_result

    - name: Display initialization result
      debug:
        msg: "{{ init_result.stdout }}"

    - name: Verify tables exist
      shell: |
        PGPASSWORD="{{ vault_postgres_password }}" psql \
          -h {{ postgres_host }} \
          -U {{ vault_postgres_user }} \
          -d {{ postgres_db }} \
          -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'"
      register: table_count

    - name: Display table count
      debug:
        msg: "Database has {{ table_count.stdout | trim }} tables"
