---
# Gravity Platform Backup Playbook
# Backs up PostgreSQL database and UMAP models

- name: Backup Gravity Platform
  hosts: ml_vms[0]  # Run from first ML VM
  become: yes
  vars_files:
    - ../vars/secrets.yml
  vars:
    backup_dir: /opt/gravity/backups
    backup_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"

  tasks:
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Backup UMAP models
      archive:
        path: /opt/gravity/umap/models
        dest: "{{ backup_dir }}/umap-models-{{ backup_timestamp }}.tar.gz"
        format: gz
      when: "'umap' in gravity_services"

    - name: Backup PostgreSQL database
      shell: |
        PGPASSWORD="{{ vault_postgres_password }}" pg_dump \
          -h {{ postgres_host }} \
          -U {{ vault_postgres_user }} \
          -d {{ postgres_db }} \
          --format=custom \
          --file={{ backup_dir }}/gravity-db-{{ backup_timestamp }}.dump
      environment:
        PGPASSWORD: "{{ vault_postgres_password }}"

    - name: List backups
      find:
        paths: "{{ backup_dir }}"
        patterns: "*.tar.gz,*.dump"
      register: backup_files

    - name: Display backup info
      debug:
        msg: |
          Backup completed:
          - Database: gravity-db-{{ backup_timestamp }}.dump
          - UMAP Models: umap-models-{{ backup_timestamp }}.tar.gz
          - Location: {{ backup_dir }}
          - Total backups: {{ backup_files.files | length }}

    - name: Clean old backups (keep last 7)
      shell: |
        ls -t {{ backup_dir }}/gravity-db-*.dump | tail -n +8 | xargs -r rm
        ls -t {{ backup_dir }}/umap-models-*.tar.gz | tail -n +8 | xargs -r rm
      when: backup_files.files | length > 14
