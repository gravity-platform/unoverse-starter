---
# Reconcile Marketplace (npm) Node Packages against the DB
#
# The DB (Postgres installed_plugins) is the source of truth for which
# @unoverse-platform packages a deployment runs — a Studio Install records it there.
# Production has no Studio, so this playbook brings a box in line with the DB: it
# POSTs the unoverse INTERNAL runtime (loopback :4106, ungated — Docker-network trust
# boundary), which re-reads Postgres and npm-installs any recorded package missing
# from disk (the same self-healing boot reconciliation, run live — no restart).
#
# There is NO package list here or anywhere else on disk: the DB is the only source
# of truth. Additive — it does not uninstall packages absent from the DB.
#
# Usage (via CLI — recommended):
#   unoverse deploy marketplace
#
# Usage (direct ansible):
#   ansible-playbook -i inventory/production.yml playbooks/install-marketplace.yml

- name: Reconcile marketplace node packages against the DB
  hosts: all
  become: yes

  vars:
    # Runtime (internal, loopback-only) — install/uninstall/reconcile live ungated here.
    unoverse_internal: "http://127.0.0.1:4106"

  tasks:
    - name: "Unoverse internal runtime is reachable"
      uri:
        url: "{{ unoverse_internal }}/health"
        status_code: 200
      register: rt_health
      retries: 5
      delay: 3
      until: rt_health.status is defined and rt_health.status == 200

    - name: "Reconcile installed packages from the DB (install any missing from disk)"
      uri:
        url: "{{ unoverse_internal }}/plugins/reconcile"
        method: POST
        status_code: 200
        timeout: 300
      register: reconcile

    - name: "=== MARKETPLACE RECONCILE COMPLETE ==="
      debug:
        msg: |
          ============================================
          MARKETPLACE RECONCILED AGAINST THE DB
          ============================================
          Installed (per DB): {{ reconcile.json.installed | default([]) | join(', ') | default('none', true) }}
          ============================================
          The DB is the source of truth; this box now matches it.
