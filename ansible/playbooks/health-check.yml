---
# Gravity Platform Health Check Playbook
# Verifies all services are healthy

- name: Health Check Gravity Platform
  hosts: all
  become: no
  gather_facts: no

  tasks:
    - name: Check service health endpoints
      uri:
        url: "http://localhost:{{ item.port }}/health"
        status_code: 200
        return_content: yes
      register: health_results
      loop:
        - { name: server, port: 4100 }
        - { name: workflow, port: 4101 }
        - { name: node-service, port: 4102 }
        - { name: mcp-server, port: 4103 }
        - { name: memory, port: 4104 }
        - { name: umap, port: 5001 }
      when: item.name in gravity_services
      ignore_errors: yes

    - name: Check service readiness endpoints
      uri:
        url: "http://localhost:{{ item.port }}/ready"
        status_code: 200
        return_content: yes
      register: ready_results
      loop:
        - { name: server, port: 4100 }
        - { name: workflow, port: 4101 }
        - { name: node-service, port: 4102 }
        - { name: mcp-server, port: 4103 }
        - { name: memory, port: 4104 }
        - { name: umap, port: 5001 }
      when: item.name in gravity_services
      ignore_errors: yes

    - name: Display health status
      debug:
        msg: |
          Host: {{ inventory_hostname }}
          {% for result in health_results.results %}
          {% if result.item.name in gravity_services %}
          {{ result.item.name }}: {{ 'HEALTHY' if result.status == 200 else 'UNHEALTHY' }}
          {% endif %}
          {% endfor %}

    - name: Fail if any service unhealthy
      fail:
        msg: "One or more services are unhealthy on {{ inventory_hostname }}"
      when: health_results.results | selectattr('failed', 'defined') | selectattr('failed') | list | length > 0
