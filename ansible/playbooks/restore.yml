---
# Gravity Platform Restore Playbook
# Restores UMAP models from backup (database restore is customer responsibility)

- name: Restore Gravity Platform
  hosts: all
  become: yes

  vars:
    backup_path: "" # Required: path to backup file
    restore_umap: true

  pre_tasks:
    - name: Validate backup path provided
      fail:
        msg: "backup_path is required. Use: -e backup_path=/path/to/backup.tar.gz"
      when: backup_path == ""

    - name: Check backup file exists
      stat:
        path: "{{ backup_path }}"
      register: backup_file
      delegate_to: localhost

    - name: Fail if backup not found
      fail:
        msg: "Backup file not found: {{ backup_path }}"
      when: not backup_file.stat.exists

  tasks:
    - name: Stop UMAP service
      command: docker compose stop umap
      args:
        chdir: /opt/gravity
      when: restore_umap

    - name: Create restore directory
      file:
        path: /opt/gravity/restore
        state: directory
        mode: "0755"

    - name: Copy backup file to server
      copy:
        src: "{{ backup_path }}"
        dest: /opt/gravity/restore/umap-backup.tar.gz
      when: restore_umap

    - name: Backup current models (safety)
      archive:
        path: /opt/gravity/umap/models
        dest: /opt/gravity/restore/umap-models-pre-restore.tar.gz
        format: gz
      when: restore_umap
      ignore_errors: yes

    - name: Clear current models
      file:
        path: /opt/gravity/umap/models
        state: absent
      when: restore_umap

    - name: Create models directory
      file:
        path: /opt/gravity/umap/models
        state: directory
        mode: "0755"
      when: restore_umap

    - name: Extract backup
      unarchive:
        src: /opt/gravity/restore/umap-backup.tar.gz
        dest: /opt/gravity/umap/models
        remote_src: yes
      when: restore_umap

    - name: Start UMAP service
      command: docker compose up -d umap
      args:
        chdir: /opt/gravity
      when: restore_umap

    - name: Wait for UMAP to be healthy
      uri:
        url: "http://localhost:5001/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 30
      delay: 2
      when: restore_umap

    - name: Cleanup restore files
      file:
        path: /opt/gravity/restore
        state: absent

  post_tasks:
    - name: Display restore status
      debug:
        msg: |
          Restore completed:
          - UMAP models restored from: {{ backup_path }}
          - Service health: OK

          Next steps:
          1. Restore PostgreSQL database (customer responsibility)
          2. Run health check: ansible-playbook playbooks/health-check.yml
