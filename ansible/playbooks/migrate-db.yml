---
# Database Migration: Timescale → DigitalOcean PostgreSQL
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/migrate-db.yml \
#     -e source_db="postgres://user:pass@host:port/db?sslmode=require" \
#     -e target_db="postgres://user:pass@host:port/db?sslmode=require"
#
# Prerequisites:
#   - Enable 'vector' and 'pg_stat_statements' extensions on target DB
#     (DigitalOcean: Database → Settings → Allowed Extensions)
#
# What this does:
#   1. Installs postgresql-client if needed
#   2. Dumps source database to /tmp/gravity.dump
#   3. Enables extensions on target
#   4. Restores dump to target
#   5. Updates /opt/gravity/.env with new DATABASE_URL
#   6. Restarts workflow + server containers

- name: Migrate Database
  hosts: all
  become: yes

  vars_prompt:
    - name: confirm_migration
      prompt: |
        ⚠️  This will:
          1. Dump the SOURCE database
          2. Restore it to the TARGET database (overwriting existing data)
          3. Update .env to point to the TARGET database
          4. Restart services

        Type 'yes' to continue
      private: no

  tasks:
    - name: "Abort if not confirmed"
      fail:
        msg: "Migration aborted by user"
      when: confirm_migration != "yes"

    - name: "Validate source_db is provided"
      fail:
        msg: "source_db is required. Pass with -e source_db='postgres://...'"
      when: source_db is not defined or source_db == ""

    - name: "Validate target_db is provided"
      fail:
        msg: "target_db is required. Pass with -e target_db='postgres://...'"
      when: target_db is not defined or target_db == ""

    - name: "[1/6] Install postgresql-client"
      apt:
        name: postgresql-client
        state: present
        update_cache: yes

    - name: "[2/6] Dump source database"
      shell: |
        pg_dump "{{ source_db }}" --no-owner --no-acl -Fc -f /tmp/gravity.dump
      register: dump_result

    - name: "[2/6] Dump size"
      shell: ls -lh /tmp/gravity.dump | awk '{print $5}'
      register: dump_size

    - name: "[2/6] Dump complete"
      debug:
        msg: "Dump size: {{ dump_size.stdout }}"

    - name: "[3/6] Enable extensions on target"
      shell: |
        psql "{{ target_db }}" -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>&1
        psql "{{ target_db }}" -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;" 2>&1
      register: ext_result
      ignore_errors: yes

    - name: "[3/6] Extension status"
      debug:
        msg: "{{ ext_result.stdout_lines | default(['No output']) }}"

    - name: "[4/6] Restore to target database"
      shell: |
        pg_restore --no-owner --no-acl --clean --if-exists \
          -d "{{ target_db }}" /tmp/gravity.dump 2>&1 || true
      register: restore_result

    - name: "[4/6] Restore output (last 20 lines)"
      debug:
        msg: "{{ restore_result.stdout_lines[-20:] | default(['No output']) }}"

    - name: "[5/6] Verify tables exist on target"
      shell: |
        psql "{{ target_db }}" -c "\dt" 2>&1 | head -30
      register: tables_check

    - name: "[5/6] Tables on target"
      debug:
        msg: "{{ tables_check.stdout_lines }}"

    - name: "[6/6] Update .env with new DATABASE_URL"
      lineinfile:
        path: /opt/gravity/.env
        regexp: '^DATABASE_URL='
        line: "DATABASE_URL={{ target_db }}"
      when: env_file_check.stat.exists | default(true)

    - name: "[6/6] Restart services"
      shell: |
        cd /opt/gravity
        docker compose restart workflow server
      register: restart_result

    - name: "[6/6] Restart output"
      debug:
        msg: "{{ restart_result.stdout_lines | default(['Done']) }}"

  post_tasks:
    - name: "Clean up dump file"
      file:
        path: /tmp/gravity.dump
        state: absent

    - name: "=== MIGRATION SUMMARY ==="
      debug:
        msg: |
          ============================================
          DATABASE MIGRATION COMPLETE
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          Dump size: {{ dump_size.stdout }}
          Tables: {{ tables_check.stdout_lines | length - 4 }} found on target

          .env updated: DATABASE_URL now points to target
          Services restarted: workflow, server

          Next steps:
            1. Run test-connectivity.yml to verify
            2. Test the application in browser
            3. If all good, decommission the old database
          ============================================
