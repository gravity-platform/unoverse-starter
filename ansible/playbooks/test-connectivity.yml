---
# Test Connectivity and Ports
# Verifies all services are reachable and ports are open
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/test-connectivity.yml

- name: Test Connectivity and Ports
  hosts: all
  become: yes

  tasks:
    - name: "[1/6] Check Docker is running"
      command: docker info
      register: docker_info
      ignore_errors: yes

    - name: "[1/6] Docker status"
      debug:
        msg: "{{ 'Docker OK' if docker_info.rc == 0 else 'Docker NOT running' }}"

    - name: "[2/6] Check running containers"
      command: docker compose ps --format json
      args:
        chdir: /opt/gravity
      register: containers
      ignore_errors: yes

    - name: "[3/6] Test internal service ports"
      wait_for:
        host: localhost
        port: "{{ item.port }}"
        timeout: 5
      loop:
        - { name: "Canvas", port: 3001 }
        - { name: "Server", port: 4100 }
        - { name: "Workflow", port: 4101 }
        - { name: "Node Service", port: 4102 }
        - { name: "MCP Server", port: 4103 }
      register: port_checks
      ignore_errors: yes

    - name: "[4/6] Test Redis connectivity (external)"
      shell: |
        REDIS_HOST=$(grep '^REDIS_HOST=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-)
        REDIS_PORT=$(grep '^REDIS_PORT=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-)
        REDIS_HOST=${REDIS_HOST:-localhost}
        REDIS_PORT=${REDIS_PORT:-6379}
        echo "host=${REDIS_HOST} port=${REDIS_PORT}"
        timeout 5 bash -c "echo PING | nc -w 3 ${REDIS_HOST} ${REDIS_PORT}" >/dev/null 2>&1
      register: redis_check
      ignore_errors: yes

    - name: "[5/6] Test service health endpoints"
      uri:
        url: "http://localhost:{{ item.port }}/health"
        status_code: 200
        timeout: 5
      loop:
        - { name: "Server", port: 4100 }
        - { name: "Workflow", port: 4101 }
        - { name: "Node Service", port: 4102 }
        - { name: "MCP Server", port: 4103 }
      register: health_checks
      ignore_errors: yes

    - name: "[6/6] Test external connectivity (if Caddy installed)"
      wait_for:
        host: localhost
        port: "{{ item }}"
        timeout: 5
      loop: [80, 443]
      register: caddy_ports
      ignore_errors: yes

  post_tasks:
    - name: "=== CONNECTIVITY TEST RESULTS ==="
      debug:
        msg: |
          ============================================
          CONNECTIVITY TEST RESULTS
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          Docker: {{ 'OK' if docker_info.rc == 0 else 'FAILED' }}

          Service Ports:
          {% for result in port_checks.results %}
            - {{ result.item.name }} ({{ result.item.port }}): {{ 'OK' if result.failed == false else 'CLOSED' }}
          {% endfor %}

          Redis (external): {{ 'REACHABLE' if redis_check.rc == 0 else 'UNREACHABLE' }}
            {{ redis_check.stdout_lines[0] | default('') }}

          Health Endpoints:
          {% for result in health_checks.results %}
            - {{ result.item.name }}: {{ 'OK' if result.failed == false else 'FAILED' }}
          {% endfor %}

          Caddy (external):
            - Port 80: {{ 'OK' if caddy_ports.results[0].failed == false else 'CLOSED' }}
            - Port 443: {{ 'OK' if caddy_ports.results[1].failed == false else 'CLOSED' }}
          ============================================
