---
# Gravity Platform Installation Playbook
# Installs Gravity services on target VMs

- name: Install Gravity Platform
  hosts: all
  become: yes

  pre_tasks:
    - name: "[1/10] Check current system"
      debug:
        msg: "Installing Gravity Platform on {{ inventory_hostname }} ({{ ansible_host }})"

    - name: "[2/10] Install Docker via convenience script"
      shell: |
        if ! command -v docker &> /dev/null; then
          echo "Installing Docker..."
          curl -fsSL https://get.docker.com | sh
        else
          echo "Docker already installed"
        fi
      args:
        creates: /usr/bin/docker
      register: docker_install

    - name: "[2/10] Docker install output"
      debug:
        msg: "{{ docker_install.stdout_lines | default(['Docker already present']) }}"

    - name: "[3/10] Start Docker service"
      service:
        name: docker
        state: started
        enabled: yes

    - name: "[3/10] Verify Docker running"
      command: docker --version
      register: docker_version

    - name: "[3/10] Docker version"
      debug:
        msg: "{{ docker_version.stdout }}"

    - name: "[4/10] Add user to docker group"
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

  tasks:
    - name: "[5/10] Create Gravity directory"
      file:
        path: /opt/gravity
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: "[6/10] Copy .env file"
      copy:
        src: "{{ env_file | default('../files/.env') }}"
        dest: /opt/gravity/.env
        owner: "{{ ansible_user }}"
        mode: "0600"

    - name: "[6/10] Verify .env copied"
      debug:
        msg: ".env file copied to /opt/gravity/.env"

    - name: "[7/10] Copy docker-compose.yml"
      copy:
        src: "{{ playbook_dir }}/../../docker-compose.yml"
        dest: /opt/gravity/docker-compose.yml
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: "[7/10] Create nginx config directory"
      file:
        path: /opt/gravity/config/nginx
        state: directory
        owner: "{{ ansible_user }}"
        mode: "0755"

    - name: "[7/10] Copy nginx config"
      copy:
        src: "{{ playbook_dir }}/../../config/nginx/nginx.conf"
        dest: /opt/gravity/config/nginx/nginx.conf
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: "[8/10] Login to GHCR"
      shell: echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_username }}" --password-stdin
      when: ghcr_token is defined and ghcr_token != ""
      no_log: true
      register: ghcr_login

    - name: "[8/10] GHCR login status"
      debug:
        msg: "Logged in to GHCR as {{ ghcr_username }}"
      when: ghcr_token is defined and ghcr_token != ""

    - name: "[9/10] Pull Gravity images (this may take a few minutes)"
      command: docker compose pull
      args:
        chdir: /opt/gravity
      register: pull_result

    - name: "[9/10] Images pulled"
      debug:
        msg: "Docker images pulled successfully"

    - name: "[10/10] Start all Gravity services"
      command: docker compose up -d
      args:
        chdir: /opt/gravity
      register: start_result

    - name: "[10/10] Services started"
      debug:
        msg: "{{ start_result.stdout_lines | default(['Services starting...']) }}"

  post_tasks:
    - name: "Wait 10 seconds for services to initialize"
      pause:
        seconds: 10

    - name: "Health check - Server (port 4100)"
      uri:
        url: "http://localhost:4100/health"
        status_code: 200
      register: server_health
      until: server_health.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes

    - name: "Health check - Workflow (port 4101)"
      uri:
        url: "http://localhost:4101/health"
        status_code: 200
      register: workflow_health
      until: workflow_health.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes

    - name: "Health check - Node Service (port 4102)"
      uri:
        url: "http://localhost:4102/health"
        status_code: 200
      register: node_health
      until: node_health.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes

    - name: "Get running containers"
      command: docker compose ps --format json
      args:
        chdir: /opt/gravity
      register: containers
      ignore_errors: yes

    - name: "=== DEPLOYMENT SUMMARY ==="
      debug:
        msg: |
          ============================================
          GRAVITY PLATFORM DEPLOYED SUCCESSFULLY
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          Service Health:
            - Server:       {{ 'OK' if server_health.status == 200 else 'FAILED' }}
            - Workflow:     {{ 'OK' if workflow_health.status == 200 else 'FAILED' }}
            - Node Service: {{ 'OK' if node_health.status == 200 else 'FAILED' }}

          Access URLs:
            - Canvas:   http://{{ ansible_host }}:3001
            - API:      http://{{ ansible_host }}:4100
            - Grafana:  http://{{ ansible_host }}:3000
          ============================================
