---
# Gravity Platform Installation Playbook
# Installs core platform services from GHCR
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/install.yml
#
# Prerequisites:
#   - ansible/files/.env configured with GHCR_USERNAME, GHCR_TOKEN, DATABASE_URL, etc.
#
# This playbook installs CORE PLATFORM only (from GHCR images).
# For customer packages (custom nodes, design system), run deploy-packages.yml

- name: Install Gravity Platform
  hosts: all
  become: yes

  vars:
    gravity_dir: /opt/gravity
    core_services: "server workflow node-service mcp-server canvas"

  pre_tasks:
    - name: "[1/10] Check current system"
      debug:
        msg: "Installing Gravity Platform on {{ inventory_hostname }} ({{ ansible_host }})"

    - name: "[2/10] Install Docker via convenience script"
      shell: |
        if ! command -v docker &> /dev/null; then
          echo "Installing Docker..."
          curl -fsSL https://get.docker.com | sh
        else
          echo "Docker already installed"
        fi
      args:
        creates: /usr/bin/docker
      register: docker_install

    - name: "[2/10] Docker install output"
      debug:
        msg: "{{ docker_install.stdout_lines | default(['Docker already present']) }}"

    - name: "[3/10] Start Docker service"
      service:
        name: docker
        state: started
        enabled: yes

    - name: "[3/10] Verify Docker running"
      command: docker --version
      register: docker_version

    - name: "[3/10] Docker version"
      debug:
        msg: "{{ docker_version.stdout }}"

    - name: "[4/10] Add user to docker group"
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

  tasks:
    - name: "[5/10] Read GHCR credentials from local .env"
      shell: grep '^GHCR_USERNAME=' {{ env_file | default('../files/.env') }} | cut -d= -f2
      register: ghcr_username_result
      delegate_to: localhost
      become: no
      changed_when: false
      ignore_errors: yes

    - name: "[5/10] Read GHCR_TOKEN from local .env"
      shell: grep '^GHCR_TOKEN=' {{ env_file | default('../files/.env') }} | cut -d= -f2
      register: ghcr_token_result
      delegate_to: localhost
      become: no
      changed_when: false
      ignore_errors: yes

    - name: "[5/10] Set GHCR credentials"
      set_fact:
        ghcr_username: "{{ ghcr_username_result.stdout | default('') }}"
        ghcr_token: "{{ ghcr_token_result.stdout | default('') }}"

    - name: "[6/10] Create gravity directory"
      file:
        path: "{{ gravity_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        mode: "0755"

    - name: "[6/10] Copy docker-compose.yml"
      copy:
        src: "{{ playbook_dir }}/../../docker-compose.yml"
        dest: "{{ gravity_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: "[7/10] Copy .env file"
      copy:
        src: "{{ env_file | default('../files/.env') }}"
        dest: /opt/gravity/.env
        owner: "{{ ansible_user }}"
        mode: "0600"

    - name: "[8/10] Login to GHCR"
      shell: echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_username }}" --password-stdin
      when: ghcr_token != ""
      no_log: true
      register: ghcr_login

    - name: "[8/10] GHCR login status"
      debug:
        msg: "Logged in to GHCR as {{ ghcr_username }}"
      when: ghcr_token != ""

    - name: "[9/10] Pull Gravity images"
      command: docker compose pull
      args:
        chdir: /opt/gravity
      register: pull_result

    - name: "[9/10] Images pulled"
      debug:
        msg: "Docker images pulled successfully"

    - name: "[10/10] Start core Gravity services"
      command: docker compose up -d {{ core_services }}
      args:
        chdir: "{{ gravity_dir }}"
      register: start_result

    - name: "[10/10] Services started"
      debug:
        msg: "{{ start_result.stdout_lines | default(['Services starting...']) }}"

  post_tasks:
    - name: "Wait 10 seconds for services to initialize"
      pause:
        seconds: 10

    - name: "Health check - Server (port 4100)"
      uri:
        url: "http://localhost:4100/health"
        status_code: 200
      register: server_health
      until: server_health.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes

    - name: "Health check - Workflow (port 4101)"
      uri:
        url: "http://localhost:4101/health"
        status_code: 200
      register: workflow_health
      until: workflow_health.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes

    - name: "Health check - Node Service (port 4102)"
      uri:
        url: "http://localhost:4102/health"
        status_code: 200
      register: node_health
      until: node_health.status == 200
      retries: 30
      delay: 2
      ignore_errors: yes

    - name: "=== DEPLOYMENT SUMMARY ==="
      debug:
        msg: |
          ============================================
          GRAVITY PLATFORM DEPLOYED
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          Service Health:
            - Server:       {{ 'OK' if (server_health.status | default(0)) == 200 else 'FAILED' }}
            - Workflow:     {{ 'OK' if (workflow_health.status | default(0)) == 200 else 'FAILED' }}
            - Node Service: {{ 'OK' if (node_health.status | default(0)) == 200 else 'FAILED' }}

          Access URLs:
            - Canvas:   http://{{ ansible_host }}:3001
            - API:      http://{{ ansible_host }}:4100
          ============================================
