---
# Gravity Platform Observability — log viewer (Dozzle)
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/install-observability.yml
#
# Dozzle is a single ~30 MB container that tails/searches every container's logs
# in a live web UI. It stores nothing (streams from the Docker socket on demand).
# Log growth on the host is bounded by the json-file rotation set per service in
# docker-compose.yml. For enterprise, export logs to the customer SIEM instead.

- name: Install Observability (Dozzle log viewer)
  hosts: all
  become: yes

  tasks:
    - name: "[1/3] Verify Gravity is installed"
      stat:
        path: /opt/gravity/docker-compose.yml
      register: gravity_installed

    - name: "[1/3] Fail if Gravity not installed"
      fail:
        msg: "Gravity Platform not installed. Run install.yml first."
      when: not gravity_installed.stat.exists

    - name: "[2/3] Start Dozzle"
      command: docker compose --profile observability up -d dozzle
      args:
        chdir: /opt/gravity
      register: start_result

    - name: "[2/3] Dozzle started"
      debug:
        msg: "{{ start_result.stdout_lines | default(['Dozzle starting...']) }}"

    - name: "[3/3] Wait for Dozzle to be ready"
      uri:
        url: "http://localhost:8080/healthcheck"
        status_code: 200
      register: dozzle_health
      until: dozzle_health.status == 200
      retries: 10
      delay: 3
      ignore_errors: yes

  post_tasks:
    - name: "=== OBSERVABILITY INSTALLED ==="
      debug:
        msg: |
          ============================================
          OBSERVABILITY INSTALLED (Dozzle)
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          Log viewer: http://{{ ansible_host }}:8080

          Dozzle stores nothing — it streams live logs from the
          Docker socket. Host log growth is capped by json-file
          rotation (10 MB × 3 per service) in docker-compose.yml.

          Note: For enterprise, export logs to the customer SIEM instead.
          ============================================
