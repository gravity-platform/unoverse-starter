---
# Deploy Customer Packages
# Clones the customer's starter repo (set in production.yml) and builds packages on the server.
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/deploy-packages.yml
#
# Reads from production.yml:
#   starter_repo    - Customer's git repo URL (required)
#   starter_branch  - Branch to clone (default: main)
#
# Reads from ansible/files/.env:
#   PACKAGES_TOKEN  - Git token for private repos (optional)

- name: Deploy Customer Packages
  hosts: all
  become: yes

  vars:
    gravity_dir: /opt/gravity

  pre_tasks:
    - name: "Validate starter_repo is set"
      fail:
        msg: |
          starter_repo is not set. Add it to your inventory (production.yml):
            all:
              vars:
                starter_repo: "https://github.com/your-org/your-gravity.git"
      when: starter_repo is not defined or starter_repo == ''

    - name: "Read PACKAGES_TOKEN from .env"
      shell: grep '^PACKAGES_TOKEN=' {{ env_file | default('../files/.env') }} | cut -d= -f2
      register: env_packages_token
      delegate_to: localhost
      become: no
      changed_when: false
      ignore_errors: yes

    - name: "Set packages_token"
      set_fact:
        packages_token: "{{ env_packages_token.stdout | default('') | trim }}"

  tasks:
    - name: "[1/7] Install git"
      apt:
        name: git
        state: present

    - name: "[2/7] Clone {{ starter_repo }} ({{ starter_branch | default('main') }})"
      git:
        repo: "{{ 'https://' + packages_token + '@' + (starter_repo | regex_replace('^https?://', '')) if (packages_token | length > 0) else starter_repo }}"
        dest: /tmp/gravity-packages
        version: "{{ starter_branch | default('main') }}"
        force: yes
      no_log: "{{ (packages_token | length) > 0 }}"

    - name: "[3/7] Copy turbo and tsconfig"
      copy:
        src: "/tmp/gravity-packages/{{ item }}"
        dest: "{{ gravity_dir }}/{{ item }}"
        remote_src: yes
        owner: "{{ ansible_user }}"
        mode: "0644"
      loop:
        - turbo.json
        - tsconfig.base.json
      ignore_errors: yes

    - name: "[3/7] Generate server package.json (packages only, not full monorepo)"
      shell: |
        cd /tmp/gravity-packages
        node -e "
          const pkg = require('./package.json');
          const serverPkg = {
            name: pkg.name + '-server',
            version: pkg.version,
            private: true,
            workspaces: ['packages/*', 'apps/design-system'],
            scripts: {
              build: pkg.scripts.build || 'turbo run build',
              'gen:nodes': pkg.scripts['gen:nodes'] || ''
            },
            dependencies: pkg.dependencies || {},
            devDependencies: pkg.devDependencies || {},
            engines: pkg.engines || {},
            packageManager: pkg.packageManager || ''
          };
          console.log(JSON.stringify(serverPkg, null, 2));
        " > {{ gravity_dir }}/package.json
      register: pkgjson_result

    - name: "[3/7] Server package.json"
      debug:
        msg: "Generated server package.json with workspaces: packages/*, apps/design-system"

    - name: "[4/7] Sync packages to server"
      shell: |
        mkdir -p {{ gravity_dir }}/packages
        rsync -av --delete \
          --exclude='node_modules' \
          --exclude='.turbo' \
          /tmp/gravity-packages/packages/ {{ gravity_dir }}/packages/

    - name: "[4/7] Sync design-system (if present)"
      shell: |
        if [ -d /tmp/gravity-packages/apps/design-system ]; then
          mkdir -p {{ gravity_dir }}/apps
          rsync -av --delete \
            --exclude='node_modules' \
            --exclude='.turbo' \
            --exclude='.storybook-index' \
            /tmp/gravity-packages/apps/design-system/ {{ gravity_dir }}/apps/design-system/
          echo "design-system synced"
        else
          echo "no design-system in repo"
        fi
      register: ds_result

    - name: "[5/7] npm install"
      shell: |
        cd {{ gravity_dir }}
        echo "Starting npm install at $(date)"
        npm install --no-audit --no-fund 2>&1 | tail -20
        echo "npm install done at $(date)"
      register: npm_install_result
      timeout: 300

    - name: "[5/7] npm install output"
      debug:
        msg: "{{ npm_install_result.stdout_lines[-10:] | default(['done']) }}"

    - name: "[5/7] Build workspaces"
      shell: |
        cd {{ gravity_dir }}
        npm run build -w @gravity-platform/plugin-base 2>&1 | tail -10
        npm run build --workspaces --if-present 2>&1 | tail -10
      register: build_result
      timeout: 300

    - name: "[5/7] Build output"
      debug:
        msg: "{{ build_result.stdout_lines[-10:] | default(['done']) }}"

    - name: "[5/7] Generate nodes"
      shell: |
        cd {{ gravity_dir }}
        npm run gen:nodes 2>&1 | tail -10
      register: gen_result
      timeout: 120
      ignore_errors: yes

    - name: "[5/7] gen:nodes output"
      debug:
        msg: "{{ gen_result.stdout_lines[-5:] | default(['done']) }}"

    - name: "[6/7] Cleanup"
      file:
        path: /tmp/gravity-packages
        state: absent

    - name: "[7/7] Restart node-service"
      command: docker compose restart node-service
      args:
        chdir: "{{ gravity_dir }}"
      register: restart_result
      ignore_errors: yes

    - name: "=== PACKAGES DEPLOYED ==="
      debug:
        msg: |
          ============================================
          PACKAGES DEPLOYED
          ============================================
          Repo:   {{ starter_repo }} ({{ starter_branch | default('main') }})
          Build:  {{ 'OK' if build_result.rc == 0 else 'FAILED' }}
          Restart: {{ 'OK' if restart_result.rc == 0 else 'FAILED' }}
          ============================================
